# Build + publish the Snapdini app + web images to GitHub Container Registry (GHCR).
# Fires on a version tag (v1.0.0, v1.0.1, …) and on manual dispatch. No registry secrets needed —
# it uses the built-in GITHUB_TOKEN with packages:write. Images land at:
#   ghcr.io/<owner>/snapdini-app:<version>   (+ :latest)
#   ghcr.io/<owner>/snapdini-web:<version>   (+ :latest)
# Self-hosters then run docker-compose.release.yml with IMAGE_PREFIX=ghcr.io/<owner>/snapdini.
#
# MULTI-ARCH: each architecture is built on its OWN native runner (amd64 on ubuntu-latest, arm64 on
# ubuntu-24.04-arm — free for public repos), pushed BY DIGEST, then a `merge` job stitches the two
# per-arch images into a single multi-arch manifest under the version + latest tags. We do NOT use
# QEMU emulation: emulating arm64 to run `npm install` of native deps (sharp/argon2) crashes with
# "qemu: uncaught target signal 4 (Illegal instruction)". Native runners avoid that entirely.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 1.0.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    # GitHub-only: this publishes to GHCR with GitHub's token. On other forges (e.g. a Gitea mirror
    # that also reads .github/workflows) it's skipped — Gitea uses .gitea/workflows/release.yml.
    if: ${{ github.server_url == 'https://github.com' }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: app, context: app, dockerfile: app/Dockerfile }
          - { name: web, context: web, dockerfile: web/Dockerfile }
        platform:
          - { arch: amd64, runner: ubuntu-latest }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/${{ matrix.platform.arch }}
          outputs: type=image,name=ghcr.io/${{ steps.meta.outputs.owner }}/snapdini-${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image.name }}-${{ matrix.platform.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: ${{ github.server_url == 'https://github.com' }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [app, web]
    steps:
      - name: Derive version + lowercase owner
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          IMAGE="ghcr.io/${{ steps.meta.outputs.owner }}/snapdini-${{ matrix.image }}"
          docker buildx imagetools create \
            -t "$IMAGE:${{ steps.meta.outputs.version }}" \
            -t "$IMAGE:latest" \
            $(printf "$IMAGE@sha256:%s " *)
          docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}"
