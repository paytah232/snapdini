<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f0f" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Paint the correct background + theme on the very first frame to avoid a white flash before
         the app's CSS/JS loads and applies the saved appearance. -->
    <style>html{background:#0f0f0f}html[data-theme="light"]{background:#f7f7f4}</style>
    <script>
      try {
        var m = localStorage.getItem('snapdini-appearance') || 'dark';
        var light = m === 'light' || (m === 'system' && matchMedia('(prefers-color-scheme: light)').matches);
        document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
