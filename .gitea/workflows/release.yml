# Gitea Actions: build + publish the app + web images to THIS Gitea instance's container registry
# on a version tag. Mirrors .github/workflows/release.yml (which targets GHCR on GitHub). Images land at:
#   <gitea-host>/<owner>/snapdini-app:<version>   (+ :latest)   and  …-web:…
# where <version> is the tag with any leading "v" stripped (v1.0.0 -> 1.0.0), matching GHCR so the
# README's `IMAGE_TAG=1.0.0` works against either registry.
name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Gitea mints the auto-injected token with these scopes. `packages: write` is REQUIRED for the
# `docker login` below to push to Gitea's built-in container registry — without it the registry
# returns "unauthorized" at login and the build never starts.
permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: app, context: app, dockerfile: app/Dockerfile }
          - { name: web, context: web, dockerfile: web/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Derive version (strip leading v)
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      # Gitea's auto-injected token is NOT reliably accepted by Gitea's own container registry
      # (returns "unauthorized" at login on several builds). So prefer an explicit PAT secret —
      # set repo secret REGISTRY_TOKEN (a Gitea access token with package:write), optionally
      # REGISTRY_USER. Falls back to the auto token + actor if you don't set them.
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.GITEA_REGISTRY || 'gitea.pugno-nas.synology.me' }}
          username: ${{ secrets.REGISTRY_USER || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.GITEA_REGISTRY || 'gitea.pugno-nas.synology.me' }}/${{ github.repository_owner }}/snapdini-${{ matrix.name }}:${{ steps.meta.outputs.version }}
            ${{ vars.GITEA_REGISTRY || 'gitea.pugno-nas.synology.me' }}/${{ github.repository_owner }}/snapdini-${{ matrix.name }}:latest
