<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Snapdini — coming soon</title>
  <style>
    :root { --gold: #f5c518; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100%;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 32px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #fff;
      background: radial-gradient(circle at 50% 30%, #2c1e0d 0%, #1b1208 55%, #100b05 100%);
    }
    .wrap { max-width: 540px; }
    .hat { width: 96px; height: 96px; margin: 0 auto 28px; display: block; }
    h1 { font-size: clamp(2.6rem, 9vw, 4rem); font-weight: 800; color: var(--gold); letter-spacing: -0.02em; }
    .tag { font-size: clamp(1rem, 4vw, 1.3rem); margin-top: 14px; color: #fff; }
    .sub { margin-top: 18px; color: #cdbfa4; line-height: 1.6; font-size: 0.98rem; }
    .pill {
      display: inline-block; margin-top: 30px; padding: 11px 22px; border-radius: 999px;
      border: 1px solid var(--gold); color: var(--gold); font-weight: 700; font-size: 0.9rem;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    a { color: var(--gold); }
    .foot { margin-top: 36px; font-size: 0.85rem; color: #9c917c; }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="hat" viewBox="0 0 120 120" aria-hidden="true">
      <ellipse cx="60" cy="84" rx="52" ry="11" fill="#f5c518" />
      <rect x="36" y="26" width="48" height="58" rx="6" fill="#f5c518" />
      <rect x="36" y="68" width="48" height="10" fill="#2a1d0c" />
    </svg>
    <h1>Snapdini</h1>
    <p class="tag">Something magical is on its way.</p>
    <p class="sub">The vanishing camera for your event — guests scan a QR, snap a limited roll, and the whole gallery reappears when the night ends. No app to install.</p>
    <span class="pill">Coming soon</span>
    <p class="foot">Questions? <a href="mailto:support@snapdini.com">support@snapdini.com</a></p>
  </div>
</body>
</html>
