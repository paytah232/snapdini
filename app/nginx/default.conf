server {
    listen 80;
    server_name _;

    # Generous headroom for large media — plans for 90s 8K clips (multi-GB). Per-file caps are
    # enforced app-side (MAX_VIDEO_SIZE_MB); this just stops nginx 413-ing before the app sees it.
    client_max_body_size 8192m;

    # API + uploaded media are served by the Express backend.
    location /api/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Stream big uploads straight to the app rather than buffering the whole body to nginx
        # first (avoids a full second copy on disk), and allow time for slow large transfers.
        proxy_request_buffering off;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
    }

    location /uploads/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else is the SvelteKit (adapter-node) frontend.
    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
