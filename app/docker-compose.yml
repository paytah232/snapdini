# Snapdini — run from the PUBLISHED images (no build step). This is the default way to self-host and
# how production runs: it pulls the prebuilt app + web images and runs them with Postgres + nginx.
# To build from source instead, use docker-compose.dev.yml.
#
#   1. cp .env.example .env     # then fill in BASE_URL + POSTGRES_PASSWORD (+ Stripe/Mailgun/admin)
#   2. docker compose pull
#   3. docker compose up -d
#
# Pin a version with IMAGE_TAG (default `latest`); point at another registry with IMAGE_PREFIX.
# Put your TLS / reverse proxy in front of HTTP_PORT (default 8080). Upgrades = bump IMAGE_TAG, pull, up.
name: snapdini

services:
  app:
    image: ${IMAGE_PREFIX:-ghcr.io/paytah232/snapdini}-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ${UPLOADS_HOST:-./data/uploads}:${UPLOADS_DIR:-/data/uploads}
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_URL=${BASE_URL:?set BASE_URL to your public https URL}
      - DATA_DIR=/data
      - UPLOADS_DIR=${UPLOADS_DIR:-/data/uploads}
      - DATABASE_URL=${DATABASE_URL:-postgres://snapdini:${POSTGRES_PASSWORD:-snapdini}@db:5432/snapdini}
      - RETENTION_DAYS=${RETENTION_DAYS:-7}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-64}
      - MAX_VIDEO_SIZE_MB=${MAX_VIDEO_SIZE_MB:-8192}
      - IMAGE_QUALITY=${IMAGE_QUALITY:-100}
      - VIDEO_MAX_SECONDS=${VIDEO_MAX_SECONDS:-0}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY:-}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-}
      - MAILGUN_BASE=${MAILGUN_BASE:-}
      - SUPPORT_EMAIL=${SUPPORT_EMAIL:-}
      # Site admin bootstrap (both unset = no admin, no shipped default credential).
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Google sign-in (optional; both unset = Google button hidden).
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # Billing (set STRIPE_* to switch on; blank = fully free).
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - BILLING_CURRENCY=${BILLING_CURRENCY:-usd}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/config',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: ${IMAGE_PREFIX:-ghcr.io/paytah232/snapdini}-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      # adapter-node uses ORIGIN to build absolute URLs (og:image, og:url) behind the proxy.
      - ORIGIN=${BASE_URL}
      # Server-side link-preview fetches hit Express directly inside the Docker network.
      - INTERNAL_API_BASE=http://app:3000
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=snapdini
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-snapdini}
      - POSTGRES_DB=snapdini
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snapdini"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - web
