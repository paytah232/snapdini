<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign up — Snapdini</title>
<style>
  :root { --bg:#0f0f0f; --surface:#1a1a1a; --border:#2a2a2a; --text:#f5f5f5; --muted:#888; --accent:#f5c518; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
  .card { width:100%; max-width:400px; background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:32px; }
  .brand { display:inline-block; background:var(--accent); color:#111; padding:5px 11px;
    border-radius:7px; font-weight:800; font-size:1rem; margin-bottom:20px; }
  h1 { font-size:1.5rem; margin:0 0 4px; }
  p.sub { color:var(--muted); margin:0 0 24px; font-size:0.9rem; }
  label { display:block; font-size:0.8rem; color:var(--muted); margin:14px 0 5px; }
  input { width:100%; padding:11px 13px; background:#111; border:1px solid var(--border);
    border-radius:9px; color:var(--text); font-size:0.95rem; }
  input:focus { outline:2px solid var(--accent); border-color:transparent; }
  .btn { width:100%; margin-top:20px; padding:12px; border:none; border-radius:9px; font-weight:700;
    font-size:0.95rem; cursor:pointer; background:var(--accent); color:#111; }
  .btn:disabled { opacity:0.6; cursor:default; }
  .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); margin-top:10px; }
  .divider { display:flex; align-items:center; gap:12px; color:var(--muted); font-size:0.75rem; margin:18px 0; }
  .divider::before, .divider::after { content:""; flex:1; height:1px; background:var(--border); }
  .msg { margin-top:16px; padding:11px 13px; border-radius:9px; font-size:0.85rem; display:none; }
  .msg.err { background:#3a1a1a; color:#ff9b9b; display:block; }
  .msg.ok  { background:#1a2e1a; color:#9bffb0; display:block; }
  .foot { margin-top:22px; text-align:center; font-size:0.85rem; color:var(--muted); }
  a { color:var(--accent); text-decoration:none; }
  .version { margin-top:18px; font-size:0.72rem; color:#555; letter-spacing:0.03em; }
</style>
</head>
<body>
  <div class="card">
    <span class="brand">📷 Snapdini</span>
    <h1>Create your account</h1>
    <p class="sub">Run your own shared event camera in minutes.</p>

    <form id="signup-form">
      <label for="name">Your name</label>
      <input id="name" type="text" autocomplete="name" placeholder="Alex Rivera" maxlength="80" />
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" required />
      <button class="btn" type="submit" id="submit-btn">Create account</button>
    </form>

    <button class="btn btn-ghost" id="magic-btn">Email me a sign-in link instead</button>

    <div id="google-wrap" style="display:none">
      <div class="divider">or</div>
      <a class="btn btn-ghost" href="/api/auth/google" style="display:block;text-align:center">Continue with Google</a>
    </div>

    <div class="msg" id="msg"></div>

    <div class="foot">Already have an account? <a href="/login">Sign in</a></div>
  </div>
  <div class="version" id="version"></div>

<script>
const $ = id => document.getElementById(id);
const msg = (text, ok=false) => { const m=$('msg'); m.textContent=text; m.className = 'msg ' + (ok?'ok':'err'); };

// Show app version (single source of truth: /api/config) + Google availability.
fetch('/api/config').then(r=>r.json()).then(c => { $('version').textContent = 'Snapdini v' + c.version; }).catch(()=>{});
fetch('/api/auth/me').then(r=>r.json()).then(d => {
  if (d.user) location.href = '/dashboard';
  if (d.googleEnabled) $('google-wrap').style.display = 'block';
}).catch(()=>{});

$('signup-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = $('submit-btn'); btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const res = await fetch('/api/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name: $('name').value, displayName: $('name').value,
        email: $('email').value, password: $('password').value }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Sign-up failed');
    let text = 'Account created — check your email to verify and finish signing in.';
    msg(text, true);
    if (data.devLink) { // dev only (SMTP off): surface the link directly
      const m = $('msg'); m.innerHTML = text + '<br><br><a href="'+data.devLink+'">Dev: click to verify →</a>';
    }
  } catch (err) { msg(err.message); }
  finally { btn.disabled = false; btn.textContent = 'Create account'; }
});

$('magic-btn').addEventListener('click', async () => {
  if (!$('email').value) { msg('Enter your email above first'); return; }
  try {
    const res = await fetch('/api/auth/magic-link', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email: $('email').value }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not send link');
    msg(data.devLink ? 'Sign-in link (dev):' : 'Check your email for a sign-in link.', true);
    if (data.devLink) $('msg').innerHTML += '<br><br><a href="'+data.devLink+'">Dev: click to sign in →</a>';
  } catch (err) { msg(err.message); }
});
</script>
</body>
</html>
