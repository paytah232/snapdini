server {
    listen 80;
    server_name _;

    # Generous headroom for large media uploads (plans for 90s 8K clips, multi-GB). The per-file
    # cap is enforced app-side (MAX_VIDEO_SIZE_MB); this just prevents an nginx 413.
    client_max_body_size 8192m;

    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Stream big uploads to the app rather than buffering the whole body first; allow time
        # for slow large transfers (event Wi-Fi / mobile).
        proxy_request_buffering off;
        proxy_read_timeout   3600s;
        proxy_send_timeout   3600s;
    }
}
